name: CI / CD

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  # ── 1. CI — lint + type-check + build ───────────────────────────────────────
  ci:
    name: Build & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          # Provide dummy values so Next.js build does not throw on missing env
          NEXT_PUBLIC_FIREBASE_API_KEY:       dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:   dummy
          NEXT_PUBLIC_FIREBASE_PROJECT_ID:    dummy
          NEXT_PUBLIC_FIREBASE_APP_ID:        dummy
          NEXT_PUBLIC_APP_URL:                https://placeholder.example.com

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/standalone
          retention-days: 1

  # ── 2. Deploy to Staging — every push to main ────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY:     ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID:  ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID:      ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_APP_URL:              ${{ secrets.STAGING_APP_URL }}

      - name: Install CF CLI
        run: |
          curl -fsSL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" \
            | tar -zx -C /usr/local/bin cf8
          cf8 version

      - name: CF Login (Staging)
        run: |
          cf8 api "${{ secrets.CF_API }}"
          cf8 auth "${{ secrets.CF_USERNAME }}" "${{ secrets.CF_PASSWORD }}"
          cf8 target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE_STAGING }}"

      - name: Push app (no-start)
        run: cf8 push bulk-email-engine-staging --no-start

      - name: Set environment variables
        run: |
          cf8 set-env bulk-email-engine-staging HANA_HOST                        "${{ secrets.HANA_HOST }}"
          cf8 set-env bulk-email-engine-staging HANA_PORT                        "${{ secrets.HANA_PORT }}"
          cf8 set-env bulk-email-engine-staging HANA_USER                        "${{ secrets.HANA_USER }}"
          cf8 set-env bulk-email-engine-staging HANA_PASSWORD                    "${{ secrets.HANA_PASSWORD }}"
          cf8 set-env bulk-email-engine-staging HANA_SCHEMA                      "${{ secrets.HANA_SCHEMA }}"
          cf8 set-env bulk-email-engine-staging SENDGRID_API_KEY                 "${{ secrets.SENDGRID_API_KEY }}"
          cf8 set-env bulk-email-engine-staging SENDGRID_FROM_EMAIL              "${{ secrets.SENDGRID_FROM_EMAIL }}"
          cf8 set-env bulk-email-engine-staging SENDGRID_FROM_NAME               "${{ secrets.SENDGRID_FROM_NAME }}"
          cf8 set-env bulk-email-engine-staging SENDGRID_WEBHOOK_PUBLIC_KEY      "${{ secrets.SENDGRID_WEBHOOK_PUBLIC_KEY }}"
          cf8 set-env bulk-email-engine-staging FIREBASE_PROJECT_ID              "${{ secrets.FIREBASE_PROJECT_ID }}"
          cf8 set-env bulk-email-engine-staging FIREBASE_CLIENT_EMAIL            "${{ secrets.FIREBASE_CLIENT_EMAIL }}"
          cf8 set-env bulk-email-engine-staging FIREBASE_PRIVATE_KEY             "${{ secrets.FIREBASE_PRIVATE_KEY }}"
          cf8 set-env bulk-email-engine-staging NEXT_PUBLIC_FIREBASE_API_KEY     "${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}"
          cf8 set-env bulk-email-engine-staging NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN "${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}"
          cf8 set-env bulk-email-engine-staging NEXT_PUBLIC_FIREBASE_PROJECT_ID  "${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}"
          cf8 set-env bulk-email-engine-staging NEXT_PUBLIC_FIREBASE_APP_ID      "${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}"
          cf8 set-env bulk-email-engine-staging NEXT_PUBLIC_APP_URL              "${{ secrets.STAGING_APP_URL }}"

      - name: Start app
        run: cf8 start bulk-email-engine-staging

      - name: Verify
        run: cf8 app bulk-email-engine-staging

  # ── 3. Deploy to Production — tags v*.*.* only, requires approval ────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production        # GitHub environment with required reviewer gate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY:     ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID:  ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID:      ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_APP_URL:              ${{ secrets.PRODUCTION_APP_URL }}

      - name: Install CF CLI
        run: |
          curl -fsSL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" \
            | tar -zx -C /usr/local/bin cf8
          cf8 version

      - name: CF Login (Production)
        run: |
          cf8 api "${{ secrets.CF_API }}"
          cf8 auth "${{ secrets.CF_USERNAME }}" "${{ secrets.CF_PASSWORD }}"
          cf8 target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE_PRODUCTION }}"

      - name: Push app (no-start)
        run: cf8 push bulk-email-engine --no-start

      - name: Set environment variables
        run: |
          cf8 set-env bulk-email-engine HANA_HOST                        "${{ secrets.HANA_HOST }}"
          cf8 set-env bulk-email-engine HANA_PORT                        "${{ secrets.HANA_PORT }}"
          cf8 set-env bulk-email-engine HANA_USER                        "${{ secrets.HANA_USER }}"
          cf8 set-env bulk-email-engine HANA_PASSWORD                    "${{ secrets.HANA_PASSWORD }}"
          cf8 set-env bulk-email-engine HANA_SCHEMA                      "${{ secrets.HANA_SCHEMA }}"
          cf8 set-env bulk-email-engine SENDGRID_API_KEY                 "${{ secrets.SENDGRID_API_KEY }}"
          cf8 set-env bulk-email-engine SENDGRID_FROM_EMAIL              "${{ secrets.SENDGRID_FROM_EMAIL }}"
          cf8 set-env bulk-email-engine SENDGRID_FROM_NAME               "${{ secrets.SENDGRID_FROM_NAME }}"
          cf8 set-env bulk-email-engine SENDGRID_WEBHOOK_PUBLIC_KEY      "${{ secrets.SENDGRID_WEBHOOK_PUBLIC_KEY }}"
          cf8 set-env bulk-email-engine FIREBASE_PROJECT_ID              "${{ secrets.FIREBASE_PROJECT_ID }}"
          cf8 set-env bulk-email-engine FIREBASE_CLIENT_EMAIL            "${{ secrets.FIREBASE_CLIENT_EMAIL }}"
          cf8 set-env bulk-email-engine FIREBASE_PRIVATE_KEY             "${{ secrets.FIREBASE_PRIVATE_KEY }}"
          cf8 set-env bulk-email-engine NEXT_PUBLIC_FIREBASE_API_KEY     "${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}"
          cf8 set-env bulk-email-engine NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN "${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}"
          cf8 set-env bulk-email-engine NEXT_PUBLIC_FIREBASE_PROJECT_ID  "${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}"
          cf8 set-env bulk-email-engine NEXT_PUBLIC_FIREBASE_APP_ID      "${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}"
          cf8 set-env bulk-email-engine NEXT_PUBLIC_APP_URL              "${{ secrets.PRODUCTION_APP_URL }}"
          cf8 set-env bulk-email-engine APP_VERSION                      "${{ github.ref_name }}"

      - name: Start app
        run: cf8 start bulk-email-engine

      - name: Verify
        run: cf8 app bulk-email-engine
